name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: MaJie-xixi
          outputs: |
            snake/github-contribution-grid-snake.svg
            snake/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to main
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add snake/
          git diff --staged --quiet || git commit -m "chore: update snake animation"
          git push
